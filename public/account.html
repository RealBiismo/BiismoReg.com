<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>My Account – BIISMO REG</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="https://files.catbox.moe/ulokbl.png">
</head>

<body>

  <nav class="nav">
    <img src="https://files.catbox.moe/tvw8fb.png" alt="" class="logo">
  </nav>
  
  <div class="account-container glass">

    <h1 class="account-title">My Account</h1>

<p id="accountEmail" class="account-email">Loading...</p>

<button id="logoutBtn" class="logout-btn">Logout</button>

<button class="back-btn" onclick="window.location.href='/'">Back to Search</button>

<hr class="divider">



    <h2 class="section-title">My Garage</h2>
    <div id="garageList" class="list-box">
      <p class="placeholder">No saved vehicles yet.</p>
    </div>

    <hr class="divider">

    <h2 class="section-title">Recent Searches</h2>
    <div id="recentList" class="list-box">
      <p class="placeholder">No recent searches yet.</p>
    </div>

  </div>

  <script>
    async function loadAccount() {
      const res = await fetch("/api/me");
      const data = await res.json();

      if (!data.email) {
        window.location.href = "/";
        return;
      }

      document.getElementById("accountEmail").textContent = data.email;

      const gRes = await fetch("/api/garage");
      const gData = await gRes.json();
      const garageList = document.getElementById("garageList");

      if (gData.garage && gData.garage.length) {
        garageList.innerHTML = gData.garage
          .map(reg => `<div class="list-item">${reg}</div>`)
          .join("");
      }

      const rRes = await fetch("/api/recent");
      const rData = await rRes.json();
      const recentList = document.getElementById("recentList");

      if (rData.recent && rData.recent.length) {
        recentList.innerHTML = rData.recent
          .map(reg => `<div class="list-item">${reg}</div>`)
          .join("");
      }
    }

    document.getElementById("logoutBtn").onclick = async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    };

    loadAccount();
  </script>

</body>

</html>
