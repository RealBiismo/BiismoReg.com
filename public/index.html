<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIISMO REG</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="https://files.catbox.moe/ulokbl.png">
</head>

<body>

  <nav class="nav">
    <img src="https://files.catbox.moe/tvw8fb.png" alt="" class="logo">
  </nav>

  <div style="display:flex;justify-content:center;gap:10px;margin-top:10px;">
    <button id="loginBtn" class="login-btn">Login / Create Account</button>
    <button id="accountBtn" class="login-btn" style="display:none;" onclick="goToAccount()">My Account</button>
  </div>

  <div class="hero">
    <div class="glass search-card">
      <h1>UK Vehicle Check</h1>
      <p>MOT • TAX • HISTORY</p>

      <div class="plate">
        <div class="gb">GB</div>
        <input id="regInput" placeholder="PA55MGN" maxlength="8" />
      </div>

      <button onclick="checkVehicle()">SEARCH</button>
    </div>
  </div>

  <div class="disclaimer">
    <div class="disclaimer-title">We do not store searches or personal data.</div>
    <div class="disclaimer-text">
      Vehicle data is provided using official DVLA & DVSA.
      <p style="color:#89CFF0;">
        Created By
        <a href="https://instagram.com/realbiismo" target="_blank" style="color:#89CFF0;text-decoration:none;">
          RealBiismo
        </a>
      </p>
    </div>
  </div>

  <div id="result"></div>

  <script src="script.js"></script>

  <!-- LOGIN MODAL -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>Login / Create Account</h2>
      <p>Enter your email to receive a login link.</p>

      <input type="email" id="loginEmail" placeholder="you@example.com">

      <button id="sendLoginLinkBtn">Send Login Link</button>
      <button id="closeModalBtn" class="close-btn">Cancel</button>

      <p id="loginStatus" class="status-message"></p>
    </div>
  </div>

</body>
</html>
