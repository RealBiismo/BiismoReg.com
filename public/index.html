<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIISMO REG</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="https://files.catbox.moe/ulokbl.png">
</head>

<body>

  <nav class="nav">
    <img src="https://files.catbox.moe/tvw8fb.png" alt="" class="logo">
  </nav>

  <div class="top-buttons">
    <button id="loginBtn" class="login-btn">Login / Create Account</button>
  </div>

  <div class="hero">
    <div class="glass search-card">
      <h1>UK Vehicle Check</h1>
      <p>MOT • TAX • HISTORY</p>

      <div class="plate">
        <div class="gb">GB</div>
        <input id="regInput" placeholder="PA55MGN" maxlength="8" />
      </div>

      <button onclick="checkVehicle()">SEARCH</button>
    </div>
  </div>

  <div class="disclaimer">
    <div class="disclaimer-title">We do not store searches or personal data.</div>
    <div class="disclaimer-text">
      Vehicle data is provided using official DVLA & DVSA.
      <p style="color:#89CFF0;">
        Created By
        <a href="https://instagram.com/realbiismo" target="_blank" style="color:#89CFF0;text-decoration:none;">
          RealBiismo
        </a>
      </p>
    </div>
  </div>

  <div id="result"></div>

  <!-- LOGIN / REGISTER MODAL -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">✕</button>
      <h2 id="modalTitle">Login</h2>

      <div class="tab-row">
        <button id="tabLogin" class="tab active">Login</button>
        <button id="tabRegister" class="tab">Register</button>
      </div>

      <div class="modal-body">
        <input type="email" id="authEmail" placeholder="you@example.com">
        <input type="password" id="authPassword" placeholder="Password">

        <button id="authSubmitBtn">Login</button>

        <button id="forgotBtn" class="link-btn">Forgot password?</button>

        <p id="authStatus" class="status-message"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
