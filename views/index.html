<div class="hero">
  <h1>Check any UK registration</h1>
  <p>Instant DVLA & MOT data with mileage insights.</p>

  {{error}}

  <form action="/check-reg" method="POST" class="reg-form">
    <div class="plate">
      <span class="plate-eu-flag">GB</span>
      <input
        type="text"
        name="registration"
        placeholder="AB12 CDE"
        maxlength="8"
        required
      />
    </div>
    <button type="submit" class="btn-primary">Check vehicle</button>
  </form>
</div>
