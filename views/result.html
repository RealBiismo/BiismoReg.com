<a href="/" class="back-link">&larr; Back</a>

<div class="result-card glass">

    <!-- REG PLATE -->
    <div class="result-plate">
        <div class="result-reg">{{reg}}</div>
    </div>

    <!-- TITLE -->
    <h2 class="car-title">{{make}} {{model}}</h2>

    <!-- VEHICLE IMAGE (optional placeholder) -->
    <img src="https://files.catbox.moe/ulokbl.png" class="car-image" alt="Vehicle Image">

    <!-- GRID -->
    <div class="grid">

        <div class="info-box">
            <div class="info-title">Make</div>
            <div class="info-value">{{make}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Model</div>
            <div class="info-value">{{model}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Colour</div>
            <div class="info-value">{{colour}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Fuel Type</div>
            <div class="info-value">{{fuelType}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Engine Size</div>
            <div class="info-value">{{engineCapacity}} cc</div>
        </div>

        <div class="info-box">
            <div class="info-title">Year</div>
            <div class="info-value">{{year}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Tax Status</div>
            <div class="info-value {{taxClass}}">
                {{taxStatus}}
            </div>
        </div>

        <div class="info-box">
            <div class="info-title">MOT Expiry</div>
            <div class="info-value">{{motExpiry}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Last Mileage</div>
            <div class="info-value">{{lastMileage}}</div>
        </div>

        <div class="info-box">
            <div class="info-title">Avg Miles / Year</div>
            <div class="info-value">{{avgMiles}}</div>
        </div>

    </div>

    <p class="scroll-hint">Swipe to view more →</p>

    <!-- MOT HISTORY -->
    <div id="motContainer">
        {{motHtml}}
    </div>

</div>
